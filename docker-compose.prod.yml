services:
  db:
    image: pgvector/pgvector:pg16
    container_name: auditchain-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - auditchain_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: auditchain-backend
    restart: always
    depends_on:
      - db
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
    ports:
      - "8002:8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://audit-bigfour.duckdns.org
    container_name: auditchain-frontend
    restart: always
    depends_on:
      - backend
    environment:
      - INTERNAL_API_URL=http://auditchain-backend:8000
    ports:
      - "3002:3000"

volumes:
  auditchain_db_data:
